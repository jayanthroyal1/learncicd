name: MERN CI Pipeline

on:
    push:
        branches: [ main ]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
            # Backend Setup
            - name: Install Backend Dependencies
              run: |
                  cd backend
                  npm ci
            - name: Run Backend (Test)
              run: |
                  cd backend
                  node backend.js & sleep 5
            # FrontEnd Setup
            - name: Install Frontend Dependencies
              run: |
                  cd frontend
                  npm ci
            - name: Build Frontend
              run: |
                  cd frontend
                  npm run build
